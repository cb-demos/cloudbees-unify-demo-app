apiVersion: automation.cloudbees.io/v1alpha1
kind: workflow
name: finsure-bank-regulated-release

# Regulated, governed release orchestration demo for FinSure Bank.
# Lives in the APPLICATION repo (separate from the component/CI repo).
# Fully self-contained: every step is mock/echo and each job publishes a
# Markdown evidence item to the run's Evidence tab. Runs green in any
# CloudBees Unify org with no clusters, secrets, or integrations required.
# Story: governance -> staging -> validation -> approval -> production -> evidence.

on:
  workflow_dispatch:
    inputs:
      change_ticket:
        type: string
        default: CHG-10482
      release_window:
        type: string
        default: Saturday 22:00-23:00 ET

jobs:
  governance-review:
    steps:
      - name: Validate audit evidence
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "== FinSure Bank governance review =="
          echo "Change ticket:  ${{ inputs.change_ticket }}"
          echo "Release window: ${{ inputs.release_window }}"
          echo "Components:      orders-api:1.4.0, payments-api:2.8.1, web-frontend:3.2.0"
          echo "Verifying unit tests, security scans, and approvals..."
          echo "Audit evidence: COMPLETE"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Governance review — FinSure Bank
            - Change ticket: ${{ inputs.change_ticket }}
            - Release window: ${{ inputs.release_window }}
            - Components: orders-api:1.4.0, payments-api:2.8.1, web-frontend:3.2.0
            - Unit tests / security scans / approvals: verified
            - Audit evidence: **complete**

  deploy-staging:
    needs:
      - governance-review
    steps:
      - name: Deploy release to staging
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "Deploying FinSure Bank release to STAGING"
          for component in orders-api:1.4.0 payments-api:2.8.1 web-frontend:3.2.0; do
            echo "  -> deploying $component"
          done
          echo "Staging deployment: SUCCESS"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Staging deployment
            - Environment: staging
            - orders-api:1.4.0 — deployed
            - payments-api:2.8.1 — deployed
            - web-frontend:3.2.0 — deployed
            - Status: **success**

  staging-validation:
    needs:
      - deploy-staging
    steps:
      - name: Run smoke tests and release checks
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "Running smoke tests..."
          echo "Checking SLO dashboards..."
          echo "Validating audit controls..."
          echo "Staging validation: PASSED"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Staging validation
            - Smoke tests: passed
            - SLO dashboards: within thresholds
            - Audit controls: validated
            - Status: **passed**

  production-approval:
    needs:
      - staging-validation
    steps:
      - name: Production approval (demo talking point)
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "TALKING POINT: add a manual approval gate here in the CloudBees Unify Workflow Composer."
          echo "Suggested approvers: Release Manager, Security, Application Owner"
          echo "Approval: SIMULATED / APPROVED"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Production approval
            - Approvers: Release Manager, Security, Application Owner
            - Change ticket: ${{ inputs.change_ticket }}
            - Decision: **approved** (simulated for demo)

  deploy-production:
    needs:
      - production-approval
    steps:
      - name: Deploy release to production
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "Deploying FinSure Bank release to PRODUCTION"
          for component in orders-api:1.4.0 payments-api:2.8.1 web-frontend:3.2.0; do
            echo "  -> deploying $component"
          done
          echo "Production deployment: SUCCESS"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Production deployment
            - Environment: production
            - orders-api:1.4.0 — deployed
            - payments-api:2.8.1 — deployed
            - web-frontend:3.2.0 — deployed
            - Status: **success**

  release-evidence:
    needs:
      - deploy-production
    steps:
      - name: Publish release summary
        uses: docker://alpine:3.20
        shell: sh
        run: |
          echo "== Release evidence package =="
          echo "Unit tests:    passed"
          echo "Security scan: passed"
          echo "Approvals:     complete"
          echo "Deployments:   staging + production"
          echo "Change ticket: ${{ inputs.change_ticket }}"
          echo "Release COMPLETE for FinSure Bank"
      - name: Publish evidence
        uses: https://github.com/cloudbees-io/publish-evidence-item@v1
        with:
          content: |-
            ## Release evidence package — FinSure Bank
            | Control | Status |
            | --- | --- |
            | Unit tests | passed |
            | Security scan | passed |
            | Change approval | complete |
            | Staging validation | passed |
            | Production approval | approved |
            | Change ticket | ${{ inputs.change_ticket }} |

            Release: **COMPLETE**
